<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — CampaignRepo</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Geist', sans-serif;
      background: #0d0d0f;
      color: #e2e0d8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      background: #16161a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 48px 40px;
    }
    h1 { font-size: 28px; font-weight: 600; margin-bottom: 12px; }
    p { color: #8a8880; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #c8a032;
      color: #0d0d0f;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #d4ac3a; }
    .icon { font-size: 48px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📜</div>
    <h1>You're offline</h1>
    <p>CampaignRepo can't reach the server right now. Pages you've recently opened may still be available from the browser cache — try navigating back.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
