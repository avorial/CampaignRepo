services:
  campaignrepo:
    build: .
    image: campaignrepo:latest
    ports:
      - "3000:3000"
    environment:
      # Set to "true" only when serving behind HTTPS (e.g. a reverse proxy).
      SECURE_COOKIES: "false"
    volumes:
      # Persists the SQLite DB (accounts, sessions, search index).
      - campaignrepo-data:/app/data
    restart: unless-stopped

volumes:
  campaignrepo-data:
