services:
  campaignrepo:
    image: ghcr.io/avorial/campaignrepo:latest
    pull_policy: always
    ports:
      - "3000:3000"
    environment:
      # Set to "true" only when serving behind HTTPS (e.g. a reverse proxy).
      SECURE_COOKIES: "false"
      # Public URL used for GitHub App callbacks, e.g. https://campaignrepo.example.com
      APP_URL: "${APP_URL:-}"
      # Optional GitHub App connection. In Portainer, set these as stack env vars.
      # GITHUB_APP_PRIVATE_KEY may use escaped newlines: -----BEGIN...\n...\n-----END...
      GITHUB_APP_ID: "${GITHUB_APP_ID:-}"
      GITHUB_APP_SLUG: "${GITHUB_APP_SLUG:-}"
      GITHUB_APP_PRIVATE_KEY: "${GITHUB_APP_PRIVATE_KEY:-}"
      # Optional login providers. Leave blank to keep the collapsed login buttons disabled.
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GITHUB_OAUTH_CLIENT_ID: "${GITHUB_OAUTH_CLIENT_ID:-}"
      GITHUB_OAUTH_CLIENT_SECRET: "${GITHUB_OAUTH_CLIENT_SECRET:-}"
    volumes:
      # Persists the SQLite DB (accounts, sessions, search index).
      - campaignrepo-data:/app/data
    restart: unless-stopped

volumes:
  campaignrepo-data:
